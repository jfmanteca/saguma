name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Deploy vía SFTP a Hostinger
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          port: 65002
          source: "crm/api.php,crm/enviar_cotizacion.php,crm/index.html,test/index.html"
          target: /home/u868157557/domains/saguma.com.ar/public_html/
          strip_components: 0
