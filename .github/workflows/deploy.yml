name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instalar paramiko
        run: pip install paramiko

      - name: Deploy via SFTP
        env:
          SFTP_HOST: ${{ secrets.FTP_SERVER }}
          SFTP_USER: ${{ secrets.FTP_USERNAME }}
          SSH_KEY:   ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          python3 << 'EOF'
          import paramiko, os, sys, io

          host    = os.environ['SFTP_HOST']
          user    = os.environ['SFTP_USER']
          key_str = os.environ['SSH_KEY']
          port    = 65002
          base    = '/home/u868157557/domains/saguma.com.ar/public_html'

          files = [
            ('crm/api.php',              f'{base}/crm/api.php'),
            ('crm/enviar_cotizacion.php', f'{base}/crm/enviar_cotizacion.php'),
            ('crm/index.html',           f'{base}/crm/index.html'),
            ('test/index.html',          f'{base}/test/index.html'),
          ]

          if not host or not user or not key_str:
              print('ERROR: Uno o más secrets están vacíos.')
              print(f'  FTP_SERVER:      {"OK" if host else "VACÍO"}')
              print(f'  FTP_USERNAME:    {"OK" if user else "VACÍO"}')
              print(f'  SSH_PRIVATE_KEY: {"OK" if key_str else "VACÍO"}')
              sys.exit(1)

          # Cargar clave privada (RSA, Ed25519 o ECDSA)
          pkey = None
          for cls in [paramiko.RSAKey, paramiko.Ed25519Key, paramiko.ECDSAKey, paramiko.DSSKey]:
              try:
                  pkey = cls.from_private_key(io.StringIO(key_str))
                  print(f'Clave cargada: {cls.__name__}')
                  break
              except Exception:
                  continue

          if pkey is None:
              print('ERROR: No se pudo cargar la clave SSH_PRIVATE_KEY.')
              sys.exit(1)

          print(f'Conectando a {host}:{port} como {user}...')
          transport = paramiko.Transport((host, port))
          transport.connect()

          try:
              transport.auth_publickey(user, pkey)
              print('Autenticado via clave SSH.')
          except Exception as e:
              print(f'ERROR: Autenticación con clave SSH falló: {e}')
              transport.close()
              sys.exit(1)

          sftp = paramiko.SFTPClient.from_transport(transport)

          for local, remote in files:
              print(f'Subiendo {local} → {remote}')
              sftp.put(local, remote)
              print(f'  ✓ OK')

          sftp.close()
          transport.close()
          print('Deploy completo!')
          EOF
